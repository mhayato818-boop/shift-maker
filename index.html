<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト調整アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #c8f135; --accent2: #4ade80; --warn: #f97316; --danger: #ef4444;
    --text: #e8e8e8; --text-muted: #666;
    --honten: #60a5fa; --nigoten: #f472b6; --bridge: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); letter-spacing: 2px; margin-right: 32px; }
  .nav-tabs { display: flex; height: 100%; }
  .nav-tab { padding: 0 18px; height: 100%; display: flex; align-items: center; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
  label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 16px; }
  .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #0f0f0f; }
  .btn-primary:hover { background: #d4f550; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; }
  .avail-grid { display: grid; gap: 8px; margin-top: 12px; }
  .avail-row { display: grid; grid-template-columns: 90px 1fr; align-items: center; gap: 12px; }
  .avail-date { font-size: 13px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .avail-date.weekend { color: var(--warn); }
  .avail-btns { display: flex; gap: 6px; }
  .avail-btn { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .avail-btn.sel-ok { background: rgba(74,222,128,0.2); border-color: var(--accent2); color: var(--accent2); }
  .avail-btn.sel-maybe { background: rgba(251,191,36,0.2); border-color: #fbbf24; color: #fbbf24; }
  .avail-btn.sel-ng { background: rgba(239,68,68,0.2); border-color: var(--danger); color: var(--danger); }
  .shift-table-wrap { overflow-x: auto; }
  .shift-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .shift-table th { padding: 10px 12px; text-align: left; font-size: 11px; letter-spacing: 1px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 500; white-space: nowrap; }
  .shift-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .shift-table tr:last-child td { border-bottom: none; }
  .staff-list { display: flex; flex-direction: column; gap: 10px; }
  .staff-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
  .staff-name { flex: 1; font-size: 14px; }
  .alert { padding: 14px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
  .alert-warn { background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3); color: var(--warn); }
  .alert-info { background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.3); color: var(--bridge); }
  .alert-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--accent2); }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 18px; font-weight: 500; }
  .section-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .tag-honten { background: rgba(96,165,250,0.15); color: var(--honten); border: 1px solid rgba(96,165,250,0.3); }
  .tag-nigoten { background: rgba(244,114,182,0.15); color: var(--nigoten); border: 1px solid rgba(244,114,182,0.3); }
  .tag-muted { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }
  .day-staff { display: flex; flex-wrap: wrap; gap: 4px; }
  .day-chip { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); }
  .day-chip.honten { border-color: rgba(96,165,250,0.4); color: var(--honten); }
  .day-chip.nigoten { border-color: rgba(244,114,182,0.4); color: var(--nigoten); }
  .shortage { color: var(--danger); font-size: 11px; font-weight: 600; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 480px; }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .weekday-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 8px; }
  .weekday-item { text-align: center; }
  .weekday-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .weekday-item input { text-align: center; padding: 8px 4px; }
  .swap-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: end; margin-bottom: 16px; }
  .swap-arrow { color: var(--text-muted); padding-bottom: 10px; text-align: center; font-size: 18px; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; font-size: 13px; z-index: 300; transition: transform 0.3s ease; pointer-events: none; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent2); color: var(--accent2); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* DRAG & DROP SHIFT TABLE */
  .shift-day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .shift-day-header { display: grid; grid-template-columns: 100px 1fr; align-items: center; padding: 8px 12px; background: var(--surface2); }
  .shift-day-date { font-family: 'DM Mono', monospace; font-size: 12px; }
  .shift-day-date.weekend { color: var(--warn); }
  .shift-day-status { font-size: 11px; text-align: right; }
  .shift-day-body { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .shift-zone { padding: 8px 10px; min-height: 52px; border-right: 1px solid var(--border); transition: background 0.15s; }
  .shift-zone:last-child { border-right: none; }
  .shift-zone.drag-over { background: rgba(200,241,53,0.08); outline: 1px dashed var(--accent); }
  .shift-zone-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
  .shift-zone.zone-honten .shift-zone-label { color: var(--honten); }
  .shift-zone.zone-nigoten .shift-zone-label { color: var(--nigoten); }
  .shift-zone.zone-bridge .shift-zone-label { color: var(--bridge); }
  .draggable-chip { display: inline-flex; align-items: center; font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: grab; user-select: none; margin: 2px 2px; transition: opacity 0.15s, transform 0.15s; }
  .draggable-chip:active { cursor: grabbing; opacity: 0.5; }
  .draggable-chip.honten { background: rgba(96,165,250,0.15); border: 1px solid rgba(96,165,250,0.4); color: var(--honten); }
  .draggable-chip.nigoten { background: rgba(244,114,182,0.15); border: 1px solid rgba(244,114,182,0.4); color: var(--nigoten); }
  .draggable-chip.bridge { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.4); color: var(--bridge); }
  .shortage { color: var(--danger); font-size: 11px; font-weight: 600; }
  #conn-banner { background: rgba(249,115,22,0.1); border-bottom: 1px solid rgba(249,115,22,0.3); padding: 10px 24px; font-size: 13px; color: var(--warn); text-align: center; display: none; }
</style>
</head>
<body>

<div id="conn-banner">⚠️ Supabase未接続です。管理タブから接続設定を行ってください。</div>

<nav>
  <div class="nav-logo">SHIFT</div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showPanel('panel-answer',this)">📝 希望回答</div>
    <div class="nav-tab" onclick="showPanel('panel-shift',this)">📅 シフト表</div>
    <div class="nav-tab" onclick="showPanel('panel-swap',this)">🔄 シフト変更</div>
    <div class="nav-tab" onclick="showPanel('panel-admin',this)">⚙️ 管理</div>
  </div>
</nav>

<div class="main">

  <!-- 希望回答 -->
  <div id="panel-answer" class="panel active">
    <div class="section-header">
      <div><div class="section-title">希望を回答する</div><div class="section-sub">各日程に対して希望を入力してください</div></div>
    </div>
    <div class="card">
      <div class="card-title">自分の情報</div>
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label>名前</label><select id="answer-staff" onchange="renderAnswerGrid()"><option value="">スタッフを選択...</option></select></div>
        <div class="form-group" style="margin-bottom:0"><label>対象月</label><select id="answer-period" onchange="renderAnswerGrid()"><option value="">期間を選択...</option></select></div>
      </div>
    </div>
    <div id="answer-grid-wrap" class="card" style="display:none">
      <div class="card-title">日程別希望</div>
      <div id="answer-grid" class="avail-grid"></div>
      <hr class="divider">
      <button class="btn btn-primary btn-full" onclick="submitAvailability()">希望を送信する</button>
    </div>
  </div>

  <!-- シフト表 -->
  <div id="panel-shift" class="panel">
    <div class="section-header">
      <div><div class="section-title">シフト表</div><div class="section-sub">自動生成されたシフトと提案</div></div>
      <div style="display:flex;gap:10px;align-items:center">
        <select id="shift-period" onchange="loadShift()" style="width:160px"><option value="">期間を選択...</option></select>
        <button class="btn btn-primary" onclick="generateShift()">シフト生成</button>
      </div>
    </div>
    <div id="shift-alerts"></div>
    <div id="shift-content"><div class="empty">期間を選択してシフトを生成してください</div></div>
  </div>

  <!-- シフト変更 -->
  <div id="panel-swap" class="panel">
    <div class="section-header">
      <div><div class="section-title">シフト変更・交換</div><div class="section-sub">合意した変更内容を入力してください</div></div>
    </div>
    <div class="card">
      <div class="card-title">変更内容の入力</div>
      <div class="form-group"><label>対象月</label><select id="swap-period" onchange="loadSwapData()" style="max-width:200px"><option value="">期間を選択...</option></select></div>
      <hr class="divider">
      <div class="swap-row">
        <div><label>スタッフ</label><select id="swap-staff" onchange="updateSwapDates()"></select></div>
        <div class="swap-arrow">→</div>
        <div><label>変更元の日付</label><select id="swap-from-date"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label>変更先の日付</label><select id="swap-to-date"></select></div>
        <div class="form-group" style="margin-bottom:0"><label>変更先の店舗</label><select id="swap-to-store"><option value="honten">本店</option><option value="nigoten">2号店</option></select></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="applySwap()">変更を適用する</button>
    </div>
    <div class="card">
      <div class="card-title">変更履歴</div>
      <div id="swap-history"><div class="empty">変更履歴はまだありません</div></div>
    </div>
  </div>

  <!-- 管理 -->
  <div id="panel-admin" class="panel">
    <div class="section-header"><div><div class="section-title">管理設定</div></div></div>
    <div class="card">
      <div class="card-title">Supabase 接続設定</div>
      <div class="form-group"><label>Project URL</label><input type="text" id="sb-url" placeholder="https://xxxx.supabase.co"></div>
      <div class="form-group"><label>Anon Key（公開可能なキー）</label><input type="text" id="sb-key" placeholder="sb_publishable_..."></div>
      <button class="btn btn-primary" onclick="saveConfig()">接続を保存</button>
      <span id="config-status" style="font-size:13px;color:var(--text-muted);margin-left:12px"></span>
    </div>
    <div class="card">
      <div class="card-title">シフト期間の作成</div>
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label>年</label><input type="number" id="new-year" value="2025"></div>
        <div class="form-group" style="margin-bottom:0"><label>月</label><input type="number" id="new-month" min="1" max="12" value="1"></div>
      </div>
      <hr class="divider">
      <div class="card-title">店舗別・曜日別最低人数</div>
      <div style="margin-bottom:16px">
        <label style="margin-bottom:8px;color:var(--honten)">本店</label>
        <div class="weekday-grid">
          <div class="weekday-item"><div class="weekday-label">日</div><input type="number" class="hn-min" min="0" value="2"></div>
          <div class="weekday-item"><div class="weekday-label">月</div><input type="number" class="hn-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">火</div><input type="number" class="hn-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">水</div><input type="number" class="hn-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">木</div><input type="number" class="hn-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">金</div><input type="number" class="hn-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">土</div><input type="number" class="hn-min" min="0" value="2"></div>
        </div>
      </div>
      <div>
        <label style="margin-bottom:8px;color:var(--nigoten)">2号店</label>
        <div class="weekday-grid">
          <div class="weekday-item"><div class="weekday-label">日</div><input type="number" class="ng-min" min="0" value="2"></div>
          <div class="weekday-item"><div class="weekday-label">月</div><input type="number" class="ng-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">火</div><input type="number" class="ng-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">水</div><input type="number" class="ng-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">木</div><input type="number" class="ng-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">金</div><input type="number" class="ng-min" min="0" value="1"></div>
          <div class="weekday-item"><div class="weekday-label">土</div><input type="number" class="ng-min" min="0" value="2"></div>
        </div>
      </div>
      <hr class="divider">
      <button class="btn btn-primary" onclick="createPeriod()">期間を作成</button>
    </div>
    <div class="card">
      <div class="card-title">スタッフ管理</div>
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label>名前</label><input type="text" id="new-staff-name" placeholder="例：田中 太郎"></div>
        <div class="form-group" style="margin-bottom:0"><label>雇用形態</label><select id="new-staff-employment" onchange="updateRoleOptions()"><option value="employee">社員</option><option value="part">アルバイト</option></select></div>
      </div>
      <div class="form-row" style="margin-top:4px">
        <div class="form-group" style="margin-bottom:0"><label>役職</label><select id="new-staff-role"><option value="honten_manager">本店 店長</option><option value="nigoten_manager">2号店 店長</option><option value="staff_employee">スタッフ（社員）</option></select></div>
        <div class="form-group" style="margin-bottom:0"><label>所属店舗</label><select id="new-staff-store"><option value="honten">本店</option><option value="nigoten">2号店</option></select></div>
      </div>
      <hr class="divider">
      <button class="btn btn-secondary" onclick="addStaff()" style="margin-bottom:20px">スタッフを追加</button>
      <div id="staff-list" class="staff-list"><div class="empty">接続後に表示されます</div></div>
    </div>
  </div>

</div>

<div id="modal-swap" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">変更を確認</div>
    <div id="modal-swap-content"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-swap')">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmSwap()">適用する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const { createClient } = supabase;
let sb = null;

const DAYS_JP = ['日','月','火','水','木','金','土'];
const ROLE_LABELS = { honten_manager:'本店 店長', nigoten_manager:'2号店 店長', staff_employee:'スタッフ（社員）', staff_part:'アルバイト' };
const STORE_LABELS = { honten:'本店', nigoten:'2号店' };

let staffList = [], periods = [], currentShifts = [], swapShifts = [], swapData = {}, swapHistory = [], availSelections = {};

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  setTimeout(() => el.className = '', 2500);
}

function showPanel(id, tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (tab) tab.classList.add('active');
  syncPeriodSelects();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function syncPeriodSelects() {
  const opts = '<option value="">選択してください</option>' +
    periods.map(p => `<option value="${p.id}">${p.year}年${p.month}月</option>`).join('');
  ['answer-period','shift-period','swap-period'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = opts;
  });
}

window.addEventListener('DOMContentLoaded', () => {
  const url = localStorage.getItem('sb_url') || '';
  const key = localStorage.getItem('sb_key') || '';
  if (url) document.getElementById('sb-url').value = url;
  if (key) document.getElementById('sb-key').value = key;
  if (url && key) initSupabase(url, key);
  else document.getElementById('conn-banner').style.display = 'block';
});

function initSupabase(url, key) {
  try {
    sb = createClient(url, key, { db: { schema: "public" }, global: { headers: { "Accept-Profile": "public", "Content-Profile": "public" } } });
    document.getElementById('conn-banner').style.display = 'none';
    loadAll();
  } catch(e) {
    toast('接続に失敗しました: ' + e.message, 'error');
  }
}

async function loadAll() { await Promise.all([loadStaff(), loadPeriods()]); }

function saveConfig() {
  const url = document.getElementById('sb-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('sb-key').value.trim();
  if (!url || !key) { toast('URLとキーを入力してください', 'error'); return; }

async function generateShift() {
  if (!sb) { toast('先に接続設定を保存してください', 'error'); return; }
  const periodId = document.getElementById('shift-period').value;
  if (!periodId) { toast('期間を選択してください', 'error'); return; }
  const period = periods.find(p => p.id === periodId);
  if (!period) return;
  document.getElementById('shift-content').innerHTML = '<div class="loading"><span class="spinner"></span>シフトを生成中...</div>';
  const { data: availData, error: availErr } = await sb.from('availability').select('*').eq('period_id', periodId);
  if (availErr) { toast('データ取得エラー: ' + availErr.message, 'error'); return; }
  await sb.from('shifts').delete().eq('period_id', periodId);
  const { year, month } = period;
  const daysInMonth = new Date(year, month, 0).getDate();
  const min_staff = period.min_staff;
  const parts = staffList.filter(s => s.role === 'staff_part');
  const newShifts = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year, month - 1, d).getDay();
    const isWeekend = dow === 0 || dow === 6;
    const availIds = (availData || []).filter(a => a.date === dateStr && (a.status === 'ok' || a.status === 'maybe')).map(a => a.staff_id);

    // 店長：自店舗のみ
    const hontenMgr = staffList.find(s => s.role === 'honten_manager' && availIds.includes(s.id));
    const nigoteMgr = staffList.find(s => s.role === 'nigoten_manager' && availIds.includes(s.id));
    if (hontenMgr) newShifts.push({ period_id: periodId, staff_id: hontenMgr.id, date: dateStr, store: 'honten', is_bridge: false });
    if (nigoteMgr) newShifts.push({ period_id: periodId, staff_id: nigoteMgr.id, date: dateStr, store: 'nigoten', is_bridge: false });

    // 社員スタッフ（店長以外）
    const empStaffs = staffList.filter(s => s.role === 'staff_employee' && availIds.includes(s.id));

    // アルバイト（社員2人+バイト1人の平日はスキップ）
    const availParts = parts.filter(s => availIds.includes(s.id));
    const totalEmpAvail = empStaffs.length;
    const includePartTime = !(totalEmpAvail >= 2 && availParts.length >= 1 && !isWeekend);

    // この日のシフトイン予定者をカウント
    const dayStaff = [...empStaffs, ...(includePartTime ? availParts : [])];

    // 本店・2号店ごとに振り分け
    const hontenStaff = dayStaff.filter(s => s.store === 'honten');
    const nigoteStaff = dayStaff.filter(s => s.store === 'nigoten');

    // 合計3人以上かつ各店舗最低人数が1人の場合→1人をブリッジ
    const hnMin = min_staff.honten[dow];
    const ngMin = min_staff.nigoten[dow];
    const total = hontenStaff.length + nigoteStaff.length;
    const isBridgeDay = total >= 3 && hnMin <= 1 && ngMin <= 1;

    // 本店2人・2号店0人の場合→店長以外を2号店に移動
    if (hontenStaff.length >= 2 && nigoteStaff.length === 0) {
      const nonMgr = hontenStaff.filter(s => s.role !== 'honten_manager');
      if (nonMgr.length > 0) {
        // 店長は本店、それ以外は2号店
        hontenStaff.forEach(s => {
          const toNigoten = s.role !== 'honten_manager' && nonMgr[0].id === s.id;
          newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: toNigoten ? 'nigoten' : 'honten', is_bridge: false });
        });
        nigoteStaff.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: 'nigoten', is_bridge: false }));
        if (includePartTime) availParts.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: s.store, is_bridge: false }));
        continue;
      }
    }

    // 2号店2人・本店0人の場合→店長以外を本店に移動
    if (nigoteStaff.length >= 2 && hontenStaff.length === 0) {
      const nonMgr = nigoteStaff.filter(s => s.role !== 'nigoten_manager');
      if (nonMgr.length > 0) {
        nigoteStaff.forEach(s => {
          const toHonten = s.role !== 'nigoten_manager' && nonMgr[0].id === s.id;
          newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: toHonten ? 'honten' : 'nigoten', is_bridge: false });
        });
        hontenStaff.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: 'honten', is_bridge: false }));
        if (includePartTime) availParts.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: s.store, is_bridge: false }));
        continue;
      }
    }

    // ブリッジ処理：合計3人以上かつ各店舗最低1人の日
    if (isBridgeDay) {
      // 本店・2号店それぞれ最低1人確保、残り1人をブリッジ
      const allDay = [...hontenStaff, ...nigoteStaff];
      const hnAssigned = [];
      const ngAssigned = [];
      let bridgeStaff = null;
      // 店長を優先的に自店舗に
      const hnMgrInDay = allDay.find(s => s.role === 'honten_manager');
      const ngMgrInDay = allDay.find(s => s.role === 'nigoten_manager');
      if (hnMgrInDay) hnAssigned.push(hnMgrInDay);
      if (ngMgrInDay) ngAssigned.push(ngMgrInDay);
      // 残りをブリッジ候補
      const remaining = allDay.filter(s => s !== hnMgrInDay && s !== ngMgrInDay);
      remaining.forEach((s, i) => {
        if (hnAssigned.length < hnMin) hnAssigned.push(s);
        else if (ngAssigned.length < ngMin) ngAssigned.push(s);
        else bridgeStaff = s;
      });
      hnAssigned.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: 'honten', is_bridge: false }));
      ngAssigned.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: 'nigoten', is_bridge: false }));
      if (bridgeStaff) newShifts.push({ period_id: periodId, staff_id: bridgeStaff.id, date: dateStr, store: bridgeStaff.store, is_bridge: true });
    } else {
      // 通常配置
      hontenStaff.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: 'honten', is_bridge: false }));
      nigoteStaff.forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: 'nigoten', is_bridge: false }));
      if (includePartTime) availParts.filter(s => !hontenStaff.includes(s) && !nigoteStaff.includes(s)).forEach(s => newShifts.push({ period_id: periodId, staff_id: s.id, date: dateStr, store: s.store, is_bridge: false }));
    }
  }
  if (newShifts.length > 0) {
    const { error } = await sb.from('shifts').insert(newShifts);
    if (error) { toast('シフト保存エラー: ' + error.message, 'error'); return; }
  }
  toast('シフトを生成しました');
  await loadShift();
}

async function loadShift() {
  if (!sb) return;
  const periodId = document.getElementById('shift-period').value;
  if (!periodId) return;
  const period = periods.find(p => p.id === periodId);
  if (!period) return;
  const { data: shifts, error } = await sb.from('shifts').select('*').eq('period_id', periodId).order('date', { ascending: true });
  if (error) { toast('シフト読込エラー: ' + error.message, 'error'); return; }
  currentShifts = shifts || [];
  renderShiftTable(period, currentShifts);
}

function renderShiftTable(period, shifts) {
  const { year, month } = period;
  const daysInMonth = new Date(year, month, 0).getDate();
  const min_staff = period.min_staff;
  const byDate = {};
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    byDate[dateStr] = { honten: [], nigoten: [], bridge: [] };
  }
  shifts.forEach(s => {
    if (!byDate[s.date]) return;
    const zone = s.is_bridge ? 'bridge' : s.store;
    byDate[s.date][zone].push(s);
  });

  const shortages = [];
  Object.entries(byDate).forEach(([date, stores]) => {
    const dow = new Date(date + 'T00:00:00').getDay();
    const hnTotal = stores.honten.length + stores.bridge.length;
    const ngTotal = stores.nigoten.length + stores.bridge.length;
    if (hnTotal < min_staff.honten[dow]) shortages.push({ date, store: '本店', need: min_staff.honten[dow], has: hnTotal });
    if (ngTotal < min_staff.nigoten[dow]) shortages.push({ date, store: '2号店', need: min_staff.nigoten[dow], has: ngTotal });
  });

  const alertEl = document.getElementById('shift-alerts');
  if (shortages.length > 0) {
    const suggestions = generateSwapSuggestions(shifts, shortages);
    alertEl.innerHTML = `<div class="alert alert-warn">⚠️ 人手不足の日があります（${shortages.length}件）</div>
      ${suggestions.length > 0 ? `<div class="alert alert-info">💡 交換提案：<br>${suggestions.map(s=>`・${s}`).join('<br>')}</div>` : ''}`;
  } else {
    alertEl.innerHTML = '<div class="alert alert-success">✓ すべての日程で最低人数を満たしています</div>';
  }

  let html = '<div id="shift-cards">';
  Object.entries(byDate).forEach(([date, stores]) => {
    const dow = new Date(date + 'T00:00:00').getDay();
    const isWeekend = dow === 0 || dow === 6;
    const hnTotal = stores.honten.length + stores.bridge.length;
    const ngTotal = stores.nigoten.length + stores.bridge.length;
    const hnShort = hnTotal < min_staff.honten[dow];
    const ngShort = ngTotal < min_staff.nigoten[dow];
    const statusHtml = [
      hnShort ? `<span class="shortage">本店 ${hnTotal}/${min_staff.honten[dow]}</span>` : '',
      ngShort ? `<span class="shortage">2号店 ${ngTotal}/${min_staff.nigoten[dow]}</span>` : ''
    ].filter(Boolean).join(' ') || '<span style="color:var(--accent2);font-size:11px">✓</span>';

    const makeChips = (list, zone) => list.map(s => {
      const st = staffList.find(x => x.id === s.staff_id);
      return `<span class="draggable-chip ${zone}" draggable="true"
        data-shift-id="${s.id}" data-date="${date}" data-zone="${zone}"
        ondragstart="onChipDragStart(event)"
        ondragend="onChipDragEnd(event)"
        ontouchstart="onChipTouchStart(event)"
        ontouchmove="onChipTouchMove(event)"
        ontouchend="onChipTouchEnd(event)">${st ? st.name : '?'}</span>`;
    }).join('');

    html += `
      <div class="shift-day-card" ${(hnShort||ngShort)?'style="border-color:rgba(239,68,68,0.4)"':''}>
        <div class="shift-day-header">
          <div class="shift-day-date ${isWeekend?'weekend':''}">${date}（${DAYS_JP[dow]}）</div>
          <div class="shift-day-status">${statusHtml}</div>
        </div>
        <div class="shift-day-body">
          <div class="shift-zone zone-honten" data-date="${date}" data-zone="honten"
            ondragover="onZoneDragOver(event)" ondragleave="onZoneDragLeave(event)" ondrop="onZoneDrop(event)">
            <div class="shift-zone-label">本店</div>
            <div class="zone-chips">${makeChips(stores.honten,'honten')}</div>
          </div>
          <div class="shift-zone zone-nigoten" data-date="${date}" data-zone="nigoten"
            ondragover="onZoneDragOver(event)" ondragleave="onZoneDragLeave(event)" ondrop="onZoneDrop(event)">
            <div class="shift-zone-label">2号店</div>
            <div class="zone-chips">${makeChips(stores.nigoten,'nigoten')}</div>
          </div>
          <div class="shift-zone zone-bridge" data-date="${date}" data-zone="bridge"
            ondragover="onZoneDragOver(event)" ondragleave="onZoneDragLeave(event)" ondrop="onZoneDrop(event)">
            <div class="shift-zone-label">🔀 ブリッジ</div>
            <div class="zone-chips">${makeChips(stores.bridge,'bridge')}</div>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('shift-content').innerHTML = html;
}

// ============================================================
// DRAG & DROP (PC + スマホ対応)
// ============================================================
let dragShiftId = null;
let dragFromZone = null;
let touchClone = null;
let touchTarget = null;

// PC: drag events
function onChipDragStart(e) {
  dragShiftId = e.target.dataset.shiftId;
  dragFromZone = e.target.dataset.zone;
  e.dataTransfer.effectAllowed = 'move';
  e.target.style.opacity = '0.4';
}
function onChipDragEnd(e) {
  e.target.style.opacity = '';
}
function onZoneDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onZoneDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
async function onZoneDrop(e) {
  e.preventDefault();
  document.querySelectorAll('.shift-zone').forEach(z => z.classList.remove('drag-over'));
  if (!dragShiftId) return;
  const toZone = e.currentTarget.dataset.zone;
  if (toZone === dragFromZone) return;
  await moveShift(dragShiftId, dragFromZone, toZone);
  dragShiftId = null;
}

// スマホ: touch events
function onChipTouchStart(e) {
  const chip = e.currentTarget;
  dragShiftId = chip.dataset.shiftId;
  dragFromZone = chip.dataset.zone;
  // クローンを作成して指に追従させる
  touchClone = chip.cloneNode(true);
  touchClone.style.cssText = `position:fixed;z-index:9999;opacity:0.8;pointer-events:none;padding:4px 10px;border-radius:4px;font-size:12px;background:var(--surface2);border:1px solid var(--accent);color:var(--text);`;
  document.body.appendChild(touchClone);
  touchTarget = chip;
  moveTouchClone(e.touches[0]);
}
function onChipTouchMove(e) {
  e.preventDefault();
  moveTouchClone(e.touches[0]);
  // ドロップゾーンをハイライト
  document.querySelectorAll('.shift-zone').forEach(z => z.classList.remove('drag-over'));
  const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
  const zone = el ? el.closest('.shift-zone') : null;
  if (zone) zone.classList.add('drag-over');
}
async function onChipTouchEnd(e) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.shift-zone').forEach(z => z.classList.remove('drag-over'));
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const zone = el ? el.closest('.shift-zone') : null;
  if (!zone || !dragShiftId) { dragShiftId = null; return; }
  const toZone = zone.dataset.zone;
  if (toZone === dragFromZone) { dragShiftId = null; return; }
  await moveShift(dragShiftId, dragFromZone, toZone);
  dragShiftId = null;
}
function moveTouchClone(touch) {
  if (!touchClone) return;
  touchClone.style.left = (touch.clientX - 30) + 'px';
  touchClone.style.top = (touch.clientY - 20) + 'px';
}

async function moveShift(shiftId, fromZone, toZone) {
  const isBridge = toZone === 'bridge';
  const currentShift = currentShifts.find(s => s.id === shiftId);
  const store = isBridge ? (currentShift ? currentShift.store : fromZone) : toZone;
  const { error } = await sb.from('shifts').update({ store, is_bridge: isBridge }).eq('id', shiftId);
  if (error) { toast('更新エラー: ' + error.message, 'error'); return; }
  toast('シフトを移動しました');
  await loadShift();
}

function generateSwapSuggestions(shifts, shortages) {
  const suggestions = [];
  const staffShiftDates = {};
  shifts.forEach(s => { if (!staffShiftDates[s.staff_id]) staffShiftDates[s.staff_id] = []; staffShiftDates[s.staff_id].push(s.date); });
  shortages.slice(0,3).forEach(shortage => {
    Object.entries(staffShiftDates).forEach(([staffId, dates]) => {
      const sorted = [...dates].sort();
      for (let i = 0; i < sorted.length - 2; i++) {
        const d1 = (new Date(sorted[i+1]) - new Date(sorted[i])) / 86400000;
        const d2 = (new Date(sorted[i+2]) - new Date(sorted[i+1])) / 86400000;
        if (d1 === 1 && d2 === 1) {
          const staff = staffList.find(s => s.id === staffId);
          if (staff) suggestions.push(`${staff.name} の ${sorted[i+2]} を ${shortage.date}（${shortage.store}）と交換を検討`);
        }
      }
    });
  });
  return [...new Set(suggestions)].slice(0,5);
}

async function loadSwapData() {
  if (!sb) return;
  const periodId = document.getElementById('swap-period').value;
  if (!periodId) return;
  const { data, error } = await sb.from('shifts').select('*').eq('period_id', periodId).order('date', { ascending: true });
  if (error) { toast('読込エラー: ' + error.message, 'error'); return; }
  swapShifts = data || [];
  updateSwapDates();
}

function updateSwapDates() {
  const staffId = document.getElementById('swap-staff').value;
  const periodId = document.getElementById('swap-period').value;
  const period = periods.find(p => p.id === periodId);
  const staffShifts = swapShifts.filter(s => s.staff_id === staffId);
  document.getElementById('swap-from-date').innerHTML = staffShifts.length
    ? staffShifts.map(s => `<option value="${s.id}">${s.date}（${STORE_LABELS[s.store]}）</option>`).join('')
    : '<option value="">シフトなし</option>';
  if (period) {
    const { year, month } = period;
    const daysInMonth = new Date(year, month, 0).getDate();
    let opts = '';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      opts += `<option value="${dateStr}">${dateStr}</option>`;
    }
    document.getElementById('swap-to-date').innerHTML = opts;
  }
}

async function applySwap() {
  const shiftId = document.getElementById('swap-from-date').value;
  const toDate = document.getElementById('swap-to-date').value;
  const toStore = document.getElementById('swap-to-store').value;
  const staffId = document.getElementById('swap-staff').value;
  if (!shiftId || !toDate || !staffId) { toast('全項目を入力してください', 'error'); return; }
  const staff = staffList.find(s => s.id === staffId);
  const fromShift = swapShifts.find(s => s.id === shiftId) || {};
  swapData = { shiftId, toDate, toStore, staffId };
  document.getElementById('modal-swap-content').innerHTML = `
    <div class="alert alert-info">
      <strong>${staff ? staff.name : ''}</strong> のシフトを変更します<br>
      ${fromShift.date || '?'}（${STORE_LABELS[fromShift.store] || ''}）→ ${toDate}（${STORE_LABELS[toStore]}）
    </div>`;
  document.getElementById('modal-swap').classList.add('open');
}

async function confirmSwap() {
  if (!sb) return;
  const { shiftId, toDate, toStore, staffId } = swapData;
  const { error } = await sb.from('shifts').update({ date: toDate, store: toStore }).eq('id', shiftId);
  if (error) { toast('変更エラー: ' + error.message, 'error'); return; }
  closeModal('modal-swap');
  toast('シフトを変更しました');
  const staff = staffList.find(s => s.id === staffId);
  swapHistory.unshift({ staff: staff?.name, toDate, toStore, at: new Date().toLocaleString('ja-JP') });
  renderSwapHistory();
  await loadSwapData();
  const periodId = document.getElementById('swap-period').value;
  if (periodId) { document.getElementById('shift-period').value = periodId; await loadShift(); }
}

function renderSwapHistory() {
  const el = document.getElementById('swap-history');
  if (!swapHistory.length) { el.innerHTML = '<div class="empty">変更履歴はまだありません</div>'; return; }
  el.innerHTML = swapHistory.map(h => `
    <div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--text)">${h.staff}</span> →
      <span style="color:var(--accent)">${h.toDate}（${STORE_LABELS[h.toStore]}）</span>
      <span style="color:var(--text-muted);margin-left:8px;font-size:11px">${h.at}</span>
    </div>`).join('');
}
</script>
